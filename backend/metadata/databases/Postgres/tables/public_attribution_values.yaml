table:
  name: attribution_values
  schema: public
object_relationships:
  - name: attribute
    using:
      foreign_key_constraint_on: attribute_id
  - name: attribute_enum_option
    using:
      manual_configuration:
        remote_table:
          name: attribute_enum_options
          schema: public
        column_mapping:
          attribute_id: attribute_id
          attribute_enum_option_id: id
    comment: >-
      Wired manually because Hasura can only auto-derive relationships from
      single-column foreign keys. This relationship is backed by the composite
      FK (attribute_id, attribute_enum_option_id) -> attribute_enum_options
      (attribute_id, id), so the column mapping must be declared by hand.
  - name: attribution
    using:
      foreign_key_constraint_on: attribution_id
insert_permissions:
  - role: user
    permission:
      check: {}
      columns:
        - boolean_value
        - created
        - date_value
        - exceptional_attribution
        - float_value
        - integer_value
        - attribute_id
        - attribute_enum_option_id
        - attribution_id
        - text_note
        - photo_note
        - offline_id
        - text_value
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - boolean_value
        - exceptional_attribution
        - date_value
        - float_value
        - id
        - integer_value
        - attribute_id
        - attribute_enum_option_id
        - attribution_id
        - text_note
        - photo_note
        - text_value
        - created
        - modified
        - offline_id
      filter: {}
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - boolean_value
        - date_value
        - exceptional_attribution
        - float_value
        - integer_value
        - attribute_id
        - attribute_enum_option_id
        - attribution_id
        - text_note
        - photo_note
        - text_value
      filter: {}
      check: {}
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter: {}
    comment: ""
